<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Club — Prototype v2</title><!-- force-20260328-112447 --><!-- v2 -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111;
  --sidebar: #0d0d0d;
  --card: #181818;
  --border: rgba(255,255,255,0.07);
  --green: #b8f26a;
  --green2: #7abf3a;
  --green3: rgba(184,242,106,0.12);
  --white: #f0ede6;
  --mid: #555550;
  --muted: #2a2a28;
  --phone-bg: #141414;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'IBM Plex Mono',monospace;height:100vh;display:flex;overflow:hidden;}

/* ---- SIDEBAR ---- */
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sidebar-top{padding:16px;border-bottom:1px solid var(--border);}
.app-name{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-0.02em;}
.app-name span{color:var(--green);}
.app-sub{font-size:9px;color:var(--mid);letter-spacing:0.2em;margin-top:3px;}
.sidebar-scroll{flex:1;overflow-y:auto;padding:12px 0;}
.sidebar-scroll::-webkit-scrollbar{width:3px;}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--muted);}

.group-label{font-size:8px;letter-spacing:0.25em;text-transform:uppercase;color:var(--mid);padding:10px 16px 6px;}
.screen-btn{width:100%;text-align:left;background:none;border:none;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.15s;}
.screen-btn:hover{background:rgba(255,255,255,0.04);}
.screen-btn.active{background:rgba(184,242,106,0.08);}
.screen-btn.active .sb-name{color:var(--green);}
.sb-num{font-size:9px;color:var(--mid);width:20px;flex-shrink:0;}
.sb-name{font-size:11px;color:#888;line-height:1.3;}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.dot-blue{background:#5b8de8;}
.dot-green{background:var(--green);}
.dot-amber{background:#e8a85b;}
.dot-purple{background:#b87ce8;}

/* ---- MAIN ---- */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.canvas-wrap{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0;}
.canvas{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;background:radial-gradient(ellipse at center, #1a1a1a 0%, #0d0d0d 100%);padding:24px;min-width:0;}
.info-panel{width:260px;min-width:260px;background:#0d0d0d;border-left:1px solid var(--border);padding:24px 20px;overflow-y:auto;flex-shrink:0;}
.info-panel::-webkit-scrollbar{width:3px;}
.info-panel::-webkit-scrollbar-thumb{background:var(--muted);}
.info-journey{margin-bottom:20px;}
.info-journey-label{font-size:8px;letter-spacing:0.3em;text-transform:uppercase;color:var(--green);margin-bottom:10px;}
.info-journey-steps{display:flex;flex-direction:column;gap:0;}
.info-step{display:flex;gap:10px;padding-bottom:14px;position:relative;}
.info-step::before{content:'';position:absolute;left:6px;top:14px;bottom:0;width:1px;background:var(--border);}
.info-step:last-child::before{display:none;}
.info-step:last-child{padding-bottom:0;}
.info-step-dot{width:13px;height:13px;border-radius:50%;border:1px solid var(--green);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;}
.info-step-dot-inner{width:5px;height:5px;border-radius:50%;background:var(--green);}
.info-step-text{font-size:11px;color:#888;line-height:1.6;}
.info-step-text strong{color:var(--white);font-weight:500;}
.info-divider{height:1px;background:var(--border);margin:20px 0;}
.info-shows-label{font-size:8px;letter-spacing:0.3em;text-transform:uppercase;color:var(--mid);margin-bottom:12px;}
.info-point{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;}
.info-point-dot{width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px;}
.info-point-text{font-size:11px;color:#888;line-height:1.5;}
.info-point-text strong{color:var(--white);font-weight:500;}
.info-tip{background:#141f0a;border:1px solid rgba(184,242,106,0.15);border-radius:8px;padding:12px;margin-top:20px;}
.info-tip-label{font-size:7px;letter-spacing:0.25em;text-transform:uppercase;color:var(--green);margin-bottom:6px;}
.info-tip-text{font-size:10px;color:#888;line-height:1.6;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);flex-shrink:0;}
.screen-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white);}
.screen-desc{font-size:10px;color:var(--mid);margin-top:2px;}
.nav-btns{display:flex;gap:8px;}
.nav-btn{background:var(--card);border:1px solid var(--border);color:#888;font-size:11px;padding:6px 14px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.15s;}
.nav-btn:hover{border-color:var(--green);color:var(--green);}



/* ---- PHONE FRAME ---- */
.phone{width:320px;height:620px;background:var(--phone-bg);border-radius:38px;border:7px solid #2a2a2a;position:relative;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.05);}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:28px;background:#2a2a2a;border-radius:0 0 18px 18px;z-index:100;}
.phone-screen{width:100%;height:100%;overflow:hidden;position:relative;}
.phone-inner{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;}
.phone-inner::-webkit-scrollbar{display:none;}

/* ---- STATUS BAR ---- */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 0;font-size:11px;color:var(--white);flex-shrink:0;position:relative;z-index:10;}
.status-time{font-weight:600;font-size:13px;}
.status-icons{display:flex;gap:5px;align-items:center;font-size:10px;}

/* ---- GLOBAL APP STYLES ---- */
.app{background:#0d0d0d;min-height:100%;color:var(--white);font-family:'IBM Plex Mono',monospace;}

/* bottom nav */
.bnav{display:flex;background:#111;border-top:1px solid var(--border);padding:8px 0 16px;position:sticky;bottom:0;z-index:50;}
.bnav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;}
.bnav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;}
.bnav-icon{font-size:18px;opacity:0.4;}
.bnav-icon.active{opacity:1;filter:drop-shadow(0 0 4px rgba(184,242,106,0.5));}
.bnav-label{font-size:8px;letter-spacing:0.1em;color:var(--mid);text-transform:uppercase;}
.bnav-label.active{color:var(--green);}

/* page header */
.page-header{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px;flex-shrink:0;}
.ph-back{font-size:18px;opacity:0.7;cursor:pointer;}
.ph-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.ph-action{font-size:18px;opacity:0.7;}

/* filter pills */
.pills{display:flex;gap:8px;padding:0 18px 14px;overflow-x:auto;}
.pills::-webkit-scrollbar{display:none;}
.pill{padding:6px 14px;border-radius:20px;font-size:10px;letter-spacing:0.05em;white-space:nowrap;border:1px solid var(--border);}
.pill.active{background:var(--green);color:#000;font-weight:600;border-color:var(--green);}
.pill.inactive{color:#888;}

/* cards */
.round-card{margin:0 18px 12px;background:#1a1a1a;border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.round-img{width:100%;height:130px;object-fit:cover;background:linear-gradient(135deg,#1e2d12,#2d4a1e);display:flex;align-items:center;justify-content:center;font-size:32px;}
.round-body{padding:12px 14px;}
.round-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:8px;}
.round-meta{display:flex;gap:12px;margin-bottom:10px;}
.round-meta-item{display:flex;align-items:center;gap:5px;font-size:9px;color:#888;}
.round-footer{display:flex;align-items:center;justify-content:space-between;}
.avatars{display:flex;}
.av{width:22px;height:22px;border-radius:50%;background:#2a4a1a;border:1px solid #0d0d0d;margin-left:-5px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--green);}
.av:first-child{margin-left:0;}
.round-dist{font-size:9px;color:var(--mid);}
.btn-green{background:var(--green);color:#000;font-size:9px;font-weight:700;padding:6px 14px;border-radius:4px;border:none;font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;cursor:pointer;}
.btn-outline{background:transparent;color:var(--green);font-size:9px;font-weight:700;padding:6px 14px;border-radius:4px;border:1px solid var(--green);font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;cursor:pointer;}

/* map explore banner */
.map-banner{margin:0 18px 14px;background:#141f0a;border:1px solid rgba(184,242,106,0.2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.map-banner-icon{font-size:20px;flex-shrink:0;}
.map-banner-text .title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--green);}
.map-banner-text .sub{font-size:9px;color:#888;margin-top:2px;}
.map-banner-arrow{margin-left:auto;font-size:14px;color:var(--green);}

/* player row */
.player-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);}
.player-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1e3d0a,#2d5a14);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;position:relative;}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:1.5px solid #0d0d0d;}
.player-info{flex:1;}
.player-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.player-sub{font-size:9px;color:#888;margin-top:2px;}
.stars{color:#e8a85b;font-size:10px;letter-spacing:1px;}
.player-right{text-align:right;}
.player-dist{font-size:9px;color:var(--mid);}
.tag{display:inline-block;font-size:8px;padding:2px 7px;border-radius:3px;margin-top:4px;background:rgba(184,242,106,0.12);color:var(--green);border:1px solid rgba(184,242,106,0.15);}
.tag.amber{background:rgba(232,168,91,0.12);color:#e8a85b;border-color:rgba(232,168,91,0.2);}

/* section title */
.section-title{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--mid);padding:14px 18px 8px;}

/* leaderboard row */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);}
.lb-rank{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;width:28px;flex-shrink:0;}
.lb-rank.gold{color:#FFD700;}
.lb-rank.silver{color:#C0C0C0;}
.lb-rank.bronze{color:#CD7F32;}

/* profile hero */
.profile-hero{height:220px;background:linear-gradient(180deg,#0d1a04 0%,#1a3a08 50%,rgba(0,0,0,0.8) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:16px;position:relative;}
.profile-hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a1f04,#142e06,#0d1a04);opacity:0.9;}
.profile-hero-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:0.15;}
.profile-hero-content{position:relative;z-index:1;}
.profile-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
.profile-hc{font-size:22px;font-weight:700;color:var(--green);display:inline-block;margin-right:8px;}

/* stats strip */
.stats-strip{display:flex;border-bottom:1px solid var(--border);}
.stat-cell{flex:1;padding:14px 0;text-align:center;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.stat-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.stat-label{font-size:8px;color:var(--mid);margin-top:3px;letter-spacing:0.1em;}

/* splash */
.splash{background:#0a0a0a;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;}
.splash-logo-wrap{width:100px;height:100px;border-radius:50%;background:radial-gradient(#1a3a08,#0a1404);border:2px solid rgba(184,242,106,0.3);display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:20px;}
.splash-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px;}
.splash-tagline{font-size:11px;color:#888;letter-spacing:0.15em;margin-bottom:40px;}
.splash-tagline span{color:var(--green);}

/* form */
.form-field{margin:0 18px 12px;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.form-field.focused{border-color:rgba(184,242,106,0.4);}
.field-icon{font-size:14px;opacity:0.5;}
.field-text{font-size:12px;color:#666;}
.field-value{font-size:12px;color:var(--white);}
.handicap-field{margin:0 18px 12px;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.hc-label{font-size:11px;color:#888;}
.hc-badge{background:var(--green);color:#000;font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;}

/* map screen */
.map-view{height:100%;background:#0d0d0d;position:relative;}
.map-bg{width:100%;height:100%;background:#0d1208;position:absolute;inset:0;}
/* Map grid lines */
.map-bg::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(184,242,106,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(184,242,106,0.03) 1px,transparent 1px);background-size:30px 30px;}
.map-road{position:absolute;background:rgba(255,255,255,0.06);border-radius:2px;}
.map-pin{position:absolute;background:var(--green);border-radius:50% 50% 50% 0;width:32px;height:32px;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(184,242,106,0.4);}
.map-pin-inner{transform:rotate(45deg);font-size:10px;font-weight:700;color:#000;}
.map-header{position:absolute;top:0;left:0;right:0;background:rgba(13,13,13,0.95);padding:8px 16px;z-index:10;}
.map-header-content{display:flex;align-items:center;justify-content:space-between;}
.map-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.map-count{font-size:10px;color:var(--green);}

/* club page members */
.club-hero{height:140px;background:linear-gradient(135deg,#0a1f04,#1a3a08);display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;}
.club-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,13,1) 0%,transparent 50%);}

/* messaging */
.msg-bubble{padding:10px 14px;border-radius:16px;max-width:80%;margin-bottom:8px;font-size:11px;line-height:1.5;}
.msg-in{background:#1e1e1e;margin-right:auto;border-radius:4px 16px 16px 16px;}
.msg-out{background:var(--green);color:#000;margin-left:auto;border-radius:16px 4px 16px 16px;}

/* signup gate */
.gate{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(4px);}
.gate-sheet{background:#1a1a1a;border-radius:20px 20px 0 0;padding:28px 24px 40px;width:100%;border-top:1px solid var(--border);}
.gate-handle{width:36px;height:3px;background:var(--muted);border-radius:2px;margin:0 auto 20px;}
.gate-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px;}
.gate-sub{font-size:11px;color:#888;line-height:1.6;margin-bottom:24px;}

/* onboarding progress */
.onboard-progress{display:flex;gap:4px;padding:0 18px 16px;}
.op-dot{height:3px;flex:1;border-radius:2px;background:var(--muted);}
.op-dot.done{background:var(--green);}
.op-dot.active{background:var(--green);opacity:0.6;}

/* photo upload */
.photo-upload{display:flex;flex-direction:column;align-items:center;padding:20px 0 16px;}
.photo-circle{width:80px;height:80px;border-radius:50%;background:#1a1a1a;border:2px dashed rgba(184,242,106,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.photo-circle-icon{font-size:24px;opacity:0.5;}
.photo-label{font-size:9px;color:var(--mid);margin-top:8px;}

/* leaderboard podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:0;padding:20px 18px 0;}
.podium-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
.podium-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;}
.podium-name{font-size:9px;color:#888;text-align:center;}
.podium-block{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:8px 0;}
.podium-block.first{background:rgba(255,215,0,0.1);height:70px;}
.podium-block.second{background:rgba(192,192,192,0.08);height:50px;}
.podium-block.third{background:rgba(205,127,50,0.08);height:36px;}
.podium-score{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;}

</style>
</head>
<body>

let current = 0;

function show(i) {
  current = i;
  document.getElementById('phone-screen').innerHTML = screens[i].html;
  document.getElementById('screen-title').textContent = screens[i].title;
  document.getElementById('screen-desc').textContent = screens[i].desc;
  document.querySelectorAll('.screen-btn').forEach((b) => {
    const match = b.getAttribute('onclick') && b.getAttribute('onclick').match(/show\((\d+)\)/);
    const btnIdx = match ? parseInt(match[1]) : -1;
    b.classList.toggle('active', btnIdx === i);
  });
  
  const info = screenInfo[i];
  if (!info) { document.getElementById('info-content').innerHTML = ''; return; }
  
  let html_out = '';
  
  if (info.journey && info.journey.length > 0) {
    html_out += '<div class="info-journey"><div class="info-journey-label">How you get here</div><div class="info-journey-steps">';
    info.journey.forEach(step => {
      html_out += '<div class="info-step"><div class="info-step-dot"><div class="info-step-dot-inner"></div></div><div class="info-step-text"><strong>' + step[0] + '</strong><br>' + step[1] + '</div></div>';
    });
    html_out += '</div></div><div class="info-divider"></div>';
  }
  
  html_out += '<div class="info-shows-label">What this screen shows</div>';
  info.shows.forEach(point => {
    html_out += '<div class="info-point"><div class="info-point-dot"></div><div class="info-point-text">' + point + '</div></div>';
  });
  
  if (info.tip) {
    html_out += '<div class="info-tip"><div class="info-tip-label">💡 Key note</div><div class="info-tip-text">' + info.tip + '</div></div>';
  }
  
  document.getElementById('info-content').innerHTML = html_out;
}

function next() { if(current < screens.length-1) show(current+1); }
function prev() { if(current > 0) show(current-1); }

document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight') next();
  if(e.key === 'ArrowLeft') prev();
});

show(0);
